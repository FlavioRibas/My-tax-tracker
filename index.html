;padding:8px;background:white}td{border:0;padding:4px 0}td:before{content:attr(data-label) ": ";font-weight:800;color:var(--muted)}.toolbar button{width:100%}}</style></head><body><header><div class="header-inner"><h1>Physio Tax & Receipt Tracker</h1><div class="subtitle">V4.3 stable: manual OCR scan + reliable auto-fill</div><nav id="tabs"></nav></div></header><main><section id="dashboard" class="view"></section><section id="expense" class="view hidden"><div class="card"><h2>Add / Edit Expense</h2><div class="grid"><div><label>Date</label><input id="date" type="date"></div><div><label>Amount CAD</label><input id="amount" type="number" step="0.01" inputmode="decimal" placeholder="0.00" oninput="autoCalcHstIfMissing()"></div></div><div class="grid"><div><label>Vendor / Description</label><input id="vendor" placeholder="e.g., Staples, Petro Canada, College fee" oninput="suggestCategoryFromVendor()"></div><div><label>HST / Tax Paid</label><input id="hst" type="number" step="0.01" inputmode="decimal" placeholder="0.00"></div></div><div class="grid"><div><label>Category</label><select id="category"></select></div><div><label>Sub-category</label><select id="subcategory"></select></div></div><div class="grid"><div><label>Business Use %</label><input id="businessUse" type="number" min="0" max="100" step="1" value="100"></div><div><label>Payment Method</label><select id="payment"><option>Credit Card</option><option>Debit</option><option>Cash</option><option>E-transfer</option><option>Bank Payment</option><option>Other</option></select></div></div><label>Receipt Photo</label><input id="receiptFile" type="file" accept="image/*" capture="environment"><div id="receiptPreview" class="small" style="margin-top:8px"></div><div class="ocrbox"><button class="secondary" onclick="runOCR()">Scan Receipt & Auto-Fill Fields</button><div id="ocrStatus" class="small" style="margin-top:8px">Upload a clear receipt photo, then tap Scan Receipt & Auto-Fill Fields.</div></div><div id="autofillBox" class="success hidden"><b>Fields Populated</b><div id="autofillText" class="small" style="margin-top:6px"></div></div><div id="duplicateBox" class="notice hidden"><b>Possible Duplicate Found</b><div id="duplicateText" class="small" style="margin-top:6px"></div></div><label>Receipt OCR / Search Text</label><textarea id="ocrText" placeholder="OCR text appears here. You can edit it."></textarea><label>Notes</label><textarea id="notes" placeholder="Optional notes"></textarea><div class="toolbar"><button onclick="saveExpense()">Save Expense</button><button class="secondary" onclick="clearExpenseForm()">New / Clear</button></div></div></section><section id="expenses" class="view hidden"></section><section id="receipts" class="view hidden"></section><section id="vehicle" class="view hidden"></section><section id="homeoffice" class="view hidden"></section><section id="reports" class="view hidden"></section><section id="settings" class="view hidden"></section></main><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script>
const DB_NAME="physio-tax-receipt-tracker-v4-3-stable",DB_VER=1;let db,editId=null,activeTab="dashboard",currentReceiptData=null,duplicateWarning=null;const HST_RATE=0.13;const categories={"Revenue":["Physiotherapy Services","Consulting Services","Other Professional Income"],"Home Office":["Heat","Electricity","Water","Mortgage Interest","Rent","Property Taxes","Condo / Maintenance Fees","Home Insurance","Maintenance","Cleaning Supplies","Minor Repairs","Internet","Phone","Other Home Office"],"Vehicle":["Fuel & Oil","Electricity for EV","Vehicle Insurance","Supplementary Business Insurance","Registration Fees","License Fees","Maintenance & Repairs","Business Parking","Tolls","Lease Payments","Interest Charges","Other Vehicle"],"Office & Medical Supplies":["Stationery","General Office Supplies","Printing & Photos","Furniture","Decoration","Medical Supplies","Assessment Tools","Treatment Supplies"],"Professional Fees & Memberships":["College of Physiotherapists","Professional Association Dues","Professional Liability Insurance","Courses","Certifications","Seminars","Conferences","Accounting Fees","Tax Preparation Fees","Legal Fees","Consulting Fees"],"Travel":["Airfare","Train Tickets","Bus Tickets","Taxi / Uber","Hotels","Short-Term Rentals","Baggage Fees","Travel Incidentals"],"Meals & Entertainment":["Meals During Business Travel","Client Meals","Networking Events","Event Tickets","Room Rentals"],"Banking & Finance":["Monthly Fees","Transaction Fees","Interest Charges","Credit Card Processing Fees"],"Technology & Software":["Apps","Practice Management Software","Scheduling Software","Cloud Storage","Website Hosting","Domain Registration","Advertising","Social Media Advertising"],"Capital Assets":["Computers","Monitors","Printers","Hardware","Office Furniture","Medical Equipment","Appliances","Other Equipment"],"Clinic Rent":["Clinic Office Rental","Treatment Room Rental"]};

const tabs=[["dashboard","Dashboard"],["expense","Add Expense"],["expenses","Expenses"],["receipts","Receipts"],["vehicle","Vehicle"],["homeoffice","Home Office"],["reports","Reports"],["settings","Settings"]];function $(id){return document.getElementById(id)}function money(n){return Number(n||0).toLocaleString("en-CA",{style:"currency",currency:"CAD"})}function today(){return new Date().toISOString().slice(0,10)}function year(){return new Date().getFullYear()}function uid(){return Date.now()+Math.random()}function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("expenses"))d.createObjectStore("expenses",{keyPath:"id"});if(!d.objectStoreNames.contains("vehicle"))d.createObjectStore("vehicle",{keyPath:"id"});if(!d.objectStoreNames.contains("settings"))d.createObjectStore("settings",{keyPath:"key"})};req.onsuccess=e=>{db=e.target.result;resolve(db)};req.onerror=e=>reject(e)})}function store(n,m="readonly"){return db.transaction(n,m).objectStore(n)}function getAll(n){return new Promise((res,rej)=>{const r=store(n).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=rej})}function put(n,o){return new Promise((res,rej)=>{const r=store(n,"readwrite").put(o);r.onsuccess=res;r.onerror=rej})}function del(n,id){return new Promise((res,rej)=>{const r=store(n,"readwrite").delete(id);r.onsuccess=res;r.onerror=rej})}function clearStore(n){return new Promise((res,rej)=>{const r=store(n,"readwrite").clear();r.onsuccess=res;r.onerror=rej})}function getSetting(k){return new Promise((res)=>{const r=store("settings").get(k);r.onsuccess=()=>res(r.result?.value);r.onerror=()=>res(null)})}function setSetting(k,v){return put("settings",{key:k,value:v})}
function initTabs(){$("tabs").innerHTML=tabs.map(([id,n])=>`<button id="tab_${id}" onclick="showTab('${id}')">${n}</button>`).join("")}function showTab(id){activeTab=id;document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));$(id).classList.remove("hidden");tabs.forEach(([tid])=>$("tab_"+tid).classList.toggle("active",tid===id));render()}function populateCategories(){$("category").innerHTML=Object.keys(categories).map(c=>`<option>${c}</option>`).join("");$("category").addEventListener("change",updateSubcategories);updateSubcategories()}function updateSubcategories(){const cat=$("category").value;$("subcategory").innerHTML=(categories[cat]||[]).map(s=>`<option>${s}</option>`).join("")}function categorySuggestion(vendor,text=""){const combined=(vendor+" "+text).toLowerCase();for(const[regex,cat,sub]of vendorRules){if(regex.test(combined))return{cat,sub}}return{cat:"Office & Medical Supplies",sub:"General Office Supplies"}}function suggestCategoryFromVendor(){const s=categorySuggestion($("vendor").value);$("category").value=s.cat;updateSubcategories();$("subcategory").value=s.sub}function estimateHstFromTotal(total){return total?total-(total/(1+HST_RATE)):0}function autoCalcHstIfMissing(){const amt=parseFloat($("amount").value||0);if(amt&&!$("hst").value){$("hst").value=estimateHstFromTotal(amt).toFixed(2)}}
async function fileToDataURL(file){if(!file)return null;if(file.size>7*1024*1024){alert("Use a receipt photo under 7 MB.");return null}return await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}$("receiptFile").addEventListener("change",async()=>{
  const f=$("receiptFile").files[0];
  currentReceiptData=await fileToDataURL(f);
  $("receiptPreview").innerHTML=f?`Selected: ${f.name} (${Math.round(f.size/1024)} KB)`:"";
  if(currentReceiptData){
    $("receiptPreview").innerHTML+=`<br><img class="thumb" src="${currentReceiptData}">`;
    $("ocrStatus").innerHTML="Receipt loaded. Tap Scan Receipt & Auto-Fill Fields when ready.";
  }
});
function setField(id,value){if(value!==undefined&&value!==null&&value!=="")$(id).value=value}function populateFieldsFromOCR(parsed,text){setField("vendor",parsed.vendor);setField("date",parsed.date);if(parsed.total)setField("amount",Number(parsed.total).toFixed(2));if(parsed.hst)setField("hst",Number(parsed.hst).toFixed(2));else if(parsed.total)setField("hst",estimateHstFromTotal(Number(parsed.total)).toFixed(2));const suggestion=categorySuggestion(parsed.vendor||"",text||"");$("category").value=suggestion.cat;updateSubcategories();$("subcategory").value=suggestion.sub;$("ocrText").value=text||"";$("autofillBox").classList.remove("hidden");$("autofillText").innerHTML=`Vendor: <b>${$("vendor").value||"Not found"}</b><br>Date: <b>${$("date").value||"Not found"}</b><br>Amount: <b>${$("amount").value?money($("amount").value):"Not found"}</b><br>HST: <b>${$("hst").value?money($("hst").value):"Not found"}</b><br>Category: <b>${$("category").value}</b><br>Sub-category: <b>${$("subcategory").value}</b><br><br>Please review, adjust if needed, then tap Save Expense.`}
function parseReceiptText(text){const clean=text.replace(/\s+/g," ").trim();const lines=text.split(/
?
/).map(x=>x.trim()).filter(Boolean);const noise=/^(receipt|invoice|sale|debit|credit|visa|mastercard|interac|approved|thank|cashier|terminal|merchant|customer|copy|hst|gst|subtotal|total|tax|date|time|auth|change|balance|account|ref|aid|tvr|tsi)/i;let vendor=(lines.find(l=>l.length>2&&l.length<45&&!noise.test(l)&&!/\d{4,}/.test(l))||lines[0]||"").replace(/[^a-zA-Z0-9 '&.-]/g,"").trim();const datePatterns=[{r:/(20\d{2})[-\/.](0?[1-9]|1[0-2])[-\.\/](0?[1-9]|[12]\d|3[01])/,f:m=>`${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`},{r:/(0?[1-9]|[12]\d|3[01])[-\/.](0?[1-9]|1[0-2])[-\.\/](20\d{2})/,f:m=>`${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`},{r:/(0?[1-9]|1[0-2])[-\/.](0?[1-9]|[12]\d|3[01])[-\.\/](20\d{2})/,f:m=>`${m[3]}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`}];let date="";for(const p of datePatterns){const m=clean.match(p.r);if(m){date=p.f(m);break}}function num(s){return parseFloat(String(s).replace(/,/g,""))}let total="";const preferred=[...text.matchAll(/(?:amount due|balance due|grand total|total|purchase)\s*(?:cad|\$)?\s*[:\-]?\s*\$?\s*([0-9]+[.,][0-9]{2})/ig)].map(m=>num(m[1]));if(preferred.length)total=Math.max(...preferred);else{const amounts=[...text.matchAll(/\$?\s*([0-9]+[.,][0-9]{2})/g)].map(m=>num(m[1])).filter(n=>n>0&&n<100000);if(amounts.length)total=Math.max(...amounts)}let hst="";const taxMatch=text.match(/(?:hst|gst|tax)[^\d$]{0,16}\$?\s*([0-9]+[.,][0-9]{2})/i)||text.match(/\$?\s*([0-9]+[.,][0-9]{2})[^
]{0,18}(?:hst|gst|tax)/i);if(taxMatch)hst=num(taxMatch[1]);else if(total)hst=estimateHstFromTotal(total);return{vendor,date,total,hst}}
async function runOCR(){const file=$("receiptFile").files[0];if(!file&&!currentReceiptData){alert("Please upload a receipt photo first.");return}if(!window.Tesseract){$("ocrStatus").innerHTML="<span class='warn'>OCR library not loaded. Check internet connection for first OCR use.</span>";return}$("ocrStatus").innerHTML="Scanning receipt and preparing auto-fill...";try{const result=await Tesseract.recognize(file||currentReceiptData,"eng",{logger:m=>{if(m.status)$("ocrStatus").innerHTML=`OCR: ${m.status} ${m.progress?Math.round(m.progress*100)+'%':''}`;}});const text=result.data.text||"";const parsed=parseReceiptText(text);populateFieldsFromOCR(parsed,text);await checkDuplicates();$("ocrStatus").innerHTML=`<span class="ok">OCR complete.</span> Fields were populated automatically. Review them, then tap Save Expense.`}catch(err){$("ocrStatus").innerHTML="<span class='warn'>OCR failed. Try a clearer photo or enter details manually.</span>";console.error(err)}}
async function checkDuplicates(){const vendor=($("vendor").value||"").toLowerCase().trim();const date=$("date").value;const amount=parseFloat($("amount").value||0);duplicateWarning=null;$("duplicateBox").classList.add("hidden");if(!vendor||!date||!amount)return;const rows=await getAll("expenses");const dup=rows.find(e=>e.id!==editId&&e.date===date&&Math.abs(Number(e.amount||0)-amount)<0.01&&String(e.vendor||"").toLowerCase().trim()===vendor);if(dup){duplicateWarning=dup;$("duplicateBox").classList.remove("hidden");$("duplicateText").innerHTML=`Existing entry: ${dup.date} • ${dup.vendor} • ${money(dup.amount)} • ${dup.category}. Review before saving.`}}
async function saveExpense(){await checkDuplicates();if(duplicateWarning&&!confirm("This looks like a duplicate receipt/expense. Save anyway?"))return;const file=$("receiptFile").files[0];const receiptData=currentReceiptData||(file?await fileToDataURL(file):null);const existing=editId?(await getAll("expenses")).find(x=>x.id===editId):{};const item={id:editId||uid(),date:$("date").value||today(),amount:parseFloat($("amount").value||0),hst:parseFloat($("hst").value||0),vendor:$("vendor").value.trim(),category:$("category").value,subcategory:$("subcategory").value,businessUse:parseFloat($("businessUse").value||100),payment:$("payment").value,receiptData:receiptData||existing.receiptData||null,receiptName:file?.name||existing.receiptName||"",receiptType:file?.type||existing.receiptType||"",ocrText:$("ocrText").value.trim(),notes:$("notes").value.trim(),updatedAt:new Date().toISOString()};if(!item.amount&&item.category!=="Revenue"){alert("Enter an amount.");return}await put("expenses",item);clearExpenseForm();alert("Saved.");showTab("expenses")}function clearExpenseForm(){editId=null;currentReceiptData=null;duplicateWarning=null;$("date").value=today();$("amount").value="";$("hst").value="";$("vendor").value="";$("businessUse").value="100";$("payment").value="Credit Card";$("receiptFile").value="";$("receiptPreview").innerHTML="";$("ocrText").value="";$("notes").value="";$("category").value="Revenue";updateSubcategories();$("ocrStatus").innerHTML="Upload a clear receipt photo, then tap Scan Receipt & Auto-Fill Fields.";$("duplicateBox").classList.add("hidden");$("autofillBox").classList.add("hidden")}async function editExpense(id){const e=(await getAll("expenses")).find(x=>x.id===id);if(!e)return;editId=id;currentReceiptData=e.receiptData;showTab("expense");$("date").value=e.date;$("amount").value=e.amount;$("hst").value=e.hst||"";$("vendor").value=e.vendor||"";$("category").value=e.category;updateSubcategories();$("subcategory").value=e.subcategory;$("businessUse").value=e.businessUse;$("payment").value=e.payment||"Credit Card";$("ocrText").value=e.ocrText||"";$("notes").value=e.notes||"";$("receiptPreview").innerHTML=e.receiptData?`Existing receipt attached.<br><img class="thumb" src="${e.receiptData}">`:"No receipt attached.";window.scrollTo({top:0,behavior:"smooth"})}async function deleteExpense(id){if(confirm("Delete this expense and its receipt?")){await del("expenses",id);render()}}
function byYear(rows,y){return rows.filter(e=>e.date?.startsWith(String(y)))}function byMonth(rows,ym){return rows.filter(e=>e.date?.startsWith(ym))}function totals(rows){return{count:rows.length,total:rows.reduce((s,e)=>s+Number(e.amount||0),0),ded:rows.reduce((s,e)=>s+Number(e.amount||0)*Number(e.businessUse||100)/100,0),hst:rows.reduce((s,e)=>s+Number(e.hst||0)*Number(e.businessUse||100)/100,0),receipts:rows.filter(e=>e.receiptData).length}}function monthKey(d){return d.slice(0,7)}async function renderDashboard(){const rows=await getAll("expenses");const y=String(year());const currentMonth=today().slice(0,7);const yt=totals(byYear(rows,y));const mt=totals(byMonth(rows,currentMonth));const months={};byYear(rows,y).forEach(e=>{const m=monthKey(e.date);months[m]=months[m]||[];months[m].push(e)});$("dashboard").innerHTML=`<div class="metrics"><div class="metric"><span>This Month</span><b>${money(mt.total)}</b></div><div class="metric"><span>Monthly HST</span><b>${money(mt.hst)}</b></div><div class="metric"><span>${y} Deductible</span><b>${money(yt.ded)}</b></div><div class="metric"><span>Receipts</span><b>${yt.receipts}/${yt.count}</b></div></div><div class="card"><h2>Monthly Tax Dashboard</h2>${Object.keys(months).sort().reverse().map(m=>{const t=totals(months[m]);return`<p><span class="badge">${m}</span> Total: <b>${money(t.total)}</b> • Deductible: <b>${money(t.ded)}</b> • HST: <b>${money(t.hst)}</b> • Receipts: ${t.receipts}/${t.count}</p>`}).join("")||"<p class='small'>No expenses yet.</p>"}</div><div class="card"><h2>V4.1 Auto-Fill</h2><p class="small">After OCR, the app automatically fills vendor, date, amount, HST, category, sub-category, and receipt text. Review the populated fields, then save.</p><button onclick="showTab('expense')">Add Expense + Scan Receipt</button></div>`}
function filterExpenses(rows){const y=$("reportYear")?.value||String(year());const q=($("search")?.value||"").toLowerCase();const cat=$("catFilter")?.value||"";return rows.filter(e=>(!y||e.date.startsWith(y))&&(!cat||e.category===cat)&&(!q||JSON.stringify(e).toLowerCase().includes(q)))}async function renderExpenses(){const all=await getAll("expenses");$("expenses").innerHTML=`<div class="card"><h2>Expense List</h2><div class="grid3"><div><label>Year</label><input id="reportYear" type="number" value="${year()}" onchange="render()"></div><div><label>Category</label><select id="catFilter" onchange="render()"><option value="">All</option>${Object.keys(categories).map(c=>`<option>${c}</option>`).join("")}</select></div><div><label>Search</label><input id="search" placeholder="vendor, OCR text, category" oninput="render()"></div></div><div id="expensesTable" style="margin-top:12px"></div></div>`;const rows=filterExpenses(all).sort((a,b)=>String(b.date).localeCompare(String(a.date)));const t=totals(rows);$("expensesTable").innerHTML=`<p class="small">${rows.length} items • ${money(t.total)} • HST ${money(t.hst)}</p>`+(!rows.length?`<p class="small">No expenses found.</p>`:`<table><thead><tr><th>Date</th><th>Vendor</th><th>Category</th><th>Amount</th><th>HST</th><th>Receipt</th><th>Actions</th></tr></thead><tbody>${rows.map(e=>`<tr><td data-label="Date">${e.date}</td><td data-label="Vendor">${e.vendor||""}</td><td data-label="Category">${e.category}<br><span class="small">${e.subcategory||""}</span></td><td data-label="Amount">${money(e.amount)}<br><span class="small">Deductible: ${money(e.amount*e.businessUse/100)}</span></td><td data-label="HST">${money(e.hst||0)}</td><td data-label="Receipt">${e.receiptData?`<img class="thumb" src="${e.receiptData}" onclick="openReceipt(${e.id})">`:"—"}</td><td data-label="Actions"><button class="secondary" onclick="editExpense(${e.id})">Edit</button><button class="danger" onclick="deleteExpense(${e.id})">Delete</button></td></tr>`).join("")}</tbody></table>`)}async function openReceipt(id){const e=(await getAll("expenses")).find(x=>x.id===id);if(!e?.receiptData)return;const w=window.open();w.document.write(`<title>Receipt</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${e.receiptData}" style="max-width:100%;height:auto"></body>`)}async function renderReceipts(){const rows=(await getAll("expenses")).filter(e=>e.receiptData).sort((a,b)=>String(b.date).localeCompare(String(a.date)));$("receipts").innerHTML=`<div class="card"><h2>Receipt Library</h2><p class="small">Duplicate detection checks vendor + date + amount when saving.</p><div class="receipt-grid">${rows.map(e=>`<div class="receipt-card" onclick="openReceipt(${e.id})"><img src="${e.receiptData}"><div><b>${e.vendor||"Receipt"}</b><br>${e.date}<br>${money(e.amount)}<br><span class="small">${e.category}</span></div></div>`).join("")||`<p class="small">No receipts attached yet.</p>`}</div></div>`}
async function renderVehicle(){const rows=await getAll("vehicle");const y=String(year());const yr=rows.filter(r=>r.date?.startsWith(y));const business=yr.reduce((s,r)=>s+Number(r.businessKm||0),0),total=yr.reduce((s,r)=>s+Number(r.totalKm||0),0),pct=total?business/total*100:0;$("vehicle").innerHTML=`<div class="card"><h2>Vehicle Log</h2><div class="grid3"><div><label>Date</label><input id="vDate" type="date" value="${today()}"></div><div><label>Business KM</label><input id="vBusiness" type="number" step="0.1"></div><div><label>Total KM</label><input id="vTotal" type="number" step="0.1"></div></div><label>Trip / Purpose</label><input id="vPurpose" placeholder="Clinic visit, client appointment, supplies"><button onclick="saveVehicle()">Save Vehicle Entry</button></div><div class="metrics"><div class="metric"><span>${y} Business KM</span><b>${business.toFixed(1)}</b></div><div class="metric"><span>${y} Total KM</span><b>${total.toFixed(1)}</b></div><div class="metric"><span>Business Use</span><b>${pct.toFixed(1)}%</b></div><div class="metric"><span>Entries</span><b>${yr.length}</b></div></div>`}async function saveVehicle(){await put("vehicle",{id:uid(),date:$("vDate").value||today(),businessKm:parseFloat($("vBusiness").value||0),totalKm:parseFloat($("vTotal").value||0),purpose:$("vPurpose").value.trim()});renderVehicle()}
async function renderHomeOffice(){const s=await getSetting("homeOffice")||{};const total=["heat","electricity","water","insurance","maintenance","rentMortgage","propertyTax","condo"].reduce((a,k)=>a+Number(s[k]||0),0);const pct=s.homeSqft?Number(s.officeSqft||0)/Number(s.homeSqft||1)*100:0;$("homeoffice").innerHTML=`<div class="card"><h2>Home Office Calculator</h2><div class="grid"><div><label>Office Square Feet</label><input id="officeSqft" type="number" value="${s.officeSqft||""}"></div><div><label>Total Home Square Feet</label><input id="homeSqft" type="number" value="${s.homeSqft||""}"></div></div><div class="grid">${["heat","electricity","water","insurance","maintenance","rentMortgage","propertyTax","condo"].map(k=>`<div><label>${k}</label><input id="ho_${k}" type="number" step="0.01" value="${s[k]||""}"></div>`).join("")}</div><button onclick="saveHomeOffice()">Save Calculator</button></div><div class="metrics"><div class="metric"><span>Home Office %</span><b>${pct.toFixed(2)}%</b></div><div class="metric"><span>Annual Costs</span><b>${money(total)}</b></div><div class="metric"><span>Deductible</span><b>${money(total*pct/100)}</b></div></div>`}async function saveHomeOffice(){const keys=["heat","electricity","water","insurance","maintenance","rentMortgage","propertyTax","condo"];const s={officeSqft:$("officeSqft").value,homeSqft:$("homeSqft").value};keys.forEach(k=>s[k]=$("ho_"+k).value);await setSetting("homeOffice",s);renderHomeOffice()}
async function renderReports(){const rows=await getAll("expenses");const y=String(year());const yr=byYear(rows,y);const byCat={};yr.forEach(e=>{byCat[e.category]=byCat[e.category]||[];byCat[e.category].push(e)});const total=totals(yr);$("reports").innerHTML=`<div class="card"><h2>Annual CRA Tax Report - ${y}</h2><div class="metrics"><div class="metric"><span>Total Expenses</span><b>${money(total.total)}</b></div><div class="metric"><span>Deductible</span><b>${money(total.ded)}</b></div><div class="metric"><span>HST Tracked</span><b>${money(total.hst)}</b></div><div class="metric"><span>Receipts</span><b>${total.receipts}/${total.count}</b></div></div><h3>By Category</h3><table><thead><tr><th>Category</th><th>Total</th><th>Deductible</th><th>HST</th><th>Receipts</th></tr></thead><tbody>${Object.keys(byCat).map(c=>{const t=totals(byCat[c]);return`<tr><td data-label="Category">${c}</td><td data-label="Total">${money(t.total)}</td><td data-label="Deductible">${money(t.ded)}</td><td data-label="HST">${money(t.hst)}</td><td data-label="Receipts">${t.receipts}/${t.count}</td></tr>`}).join("")}</tbody></table></div><div class="card"><h2>Export / Cloud Backup</h2><p class="small">Use Backup Full App JSON for full data including receipt images. On iPhone, tap Share Backup to save to iCloud Drive or Google Drive.</p><div class="toolbar"><button onclick="exportExpensesCSV()">Export Expenses CSV</button><button class="secondary" onclick="exportVehicleCSV()">Export Vehicle CSV</button><button class="secondary" onclick="exportCRAReportCSV()">Export CRA Report CSV</button><button class="secondary" onclick="exportFullJSON(false)">Backup Full App JSON</button><button class="secondary" onclick="exportFullJSON(true)">Share Backup to Cloud</button></div><label>Restore Full App JSON</label><input type="file" accept=".json" onchange="importFullJSON(event)"></div>`}function csvEscape(v){return`"${String(v??"").replace(/"/g,'""')}"`}function download(n,c,t){const b=new Blob([c],{type:t});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=n;a.click()}async function exportExpensesCSV(){const rows=await getAll("expenses");const header=["Date","Vendor","Amount","HST","Category","Subcategory","Business Use %","Deductible Amount","Payment","Has Receipt","OCR Text","Notes"];const lines=[header.join(",")].concat(rows.map(e=>[e.date,e.vendor,e.amount,e.hst,e.category,e.subcategory,e.businessUse,(e.amount*e.businessUse/100).toFixed(2),e.payment,e.receiptData?"Yes":"No",e.ocrText,e.notes].map(csvEscape).join(",")));download("physio-expenses-v4-1.csv",lines.join("
"),"text/csv")}async function exportCRAReportCSV(){const rows=byYear(await getAll("expenses"),year());const byCat={};rows.forEach(e=>{byCat[e.category]=byCat[e.category]||[];byCat[e.category].push(e)});const lines=["Category,Total,Deductible,HST,Receipt Count,Entry Count"].concat(Object.keys(byCat).map(c=>{const t=totals(byCat[c]);return[c,t.total.toFixed(2),t.ded.toFixed(2),t.hst.toFixed(2),t.receipts,t.count].map(csvEscape).join(",")}));download("annual-cra-tax-report-v4-1.csv",lines.join("
"),"text/csv")}async function exportVehicleCSV(){const rows=await getAll("vehicle");download("vehicle-log.csv",["Date,Purpose,Business KM,Total KM"].concat(rows.map(r=>[r.date,r.purpose,r.businessKm,r.totalKm].map(csvEscape).join(","))).join("
"),"text/csv")}async function exportFullJSON(share){const data={expenses:await getAll("expenses"),vehicle:await getAll("vehicle"),settings:await getAll("settings"),exportedAt:new Date().toISOString(),app:"physio-tax-receipt-tracker-v4-3-stable"};const content=JSON.stringify(data,null,2);const file=new File([content],"physio-tax-tracker-v4-1-full-backup.json",{type:"application/json"});if(share&&navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Physio Tax Tracker Backup",text:"Save this backup to iCloud Drive or Google Drive."})}else{download("physio-tax-tracker-v4-1-full-backup.json",content,"application/json")}}async function importFullJSON(ev){const f=ev.target.files[0];if(!f)return;const data=JSON.parse(await f.text());if(!confirm("Restore this backup and replace current data?"))return;await clearStore("expenses");await clearStore("vehicle");await clearStore("settings");for(const e of data.expenses||[])await put("expenses",e);for(const v of data.vehicle||[])await put("vehicle",v);for(const s of data.settings||[])await put("settings",s);alert("Restored.");render()}async function renderSettings(){$("settings").innerHTML=`<div class="card"><h2>V4.1 Settings / Notes</h2><p class="small">After OCR, the app automatically populates vendor, date, amount, HST, category, sub-category, and receipt text. Always review fields before saving.</p></div><div class="card"><h2>Erase Data</h2><button class="danger" onclick="wipeAll()">Erase All App Data</button></div>`}async function wipeAll(){if(confirm("Erase all app data on this device?")){await clearStore("expenses");await clearStore("vehicle");await clearStore("settings");location.reload()}}async function render(){if(activeTab==="dashboard")await renderDashboard();if(activeTab==="expenses")await renderExpenses();if(activeTab==="receipts")await renderReceipts();if(activeTab==="vehicle")await renderVehicle();if(activeTab==="homeoffice")await renderHomeOffice();if(activeTab==="reports")await renderReports();if(activeTab==="settings")await renderSettings()}async function boot(){await openDB();initTabs();populateCategories();$("date").value=today();showTab("dashboard");/* V4.3 stable: service worker disabled to prevent reload crashes on GitHub Pages/iPhone */}boot();
</script></body></html>
